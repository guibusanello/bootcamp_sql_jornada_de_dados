services:
  postgres:
    image: postgres:16
    container_name: northwind_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: northwind
    ports:
      - "5432:5432"
    volumes:
      - ./northwind.sql:/docker-entrypoint-initdb.d/northwind.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
